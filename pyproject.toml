[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.flake8]
max-line-length = 100
extend-ignore = [
    "E203",  # whitespace before ':' — black-compatible slice formatting
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"
markers = [
    "slow: takes >5s, requires real filesystem or subprocess; runs at release only",
    "integration: hits real external systems (GitHub API, network); runs at release only",
]

[tool.coverage.run]
source = ["scripts/oversight/validators", "scripts/oversight/token_tracker"]
omit = ["*/test_*", "*/__init__.py", "*/conftest.py"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.mutmut]
paths_to_mutate = "scripts/oversight/validators/"
runner = "python -m pytest tests/ -x -q --no-header"
tests_dir = "tests/"
# Exclude __init__.py and files that are primarily subprocess wrappers
# (those are integration-tested, not unit-tested)
dict_synonyms = ""
