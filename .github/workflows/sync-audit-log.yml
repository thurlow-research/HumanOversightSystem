name: Sync audit logs to main

on:
  push:
    branches:
      - audit-log
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch audit files from audit-log branch
        run: |
          git fetch origin audit-log 2>/dev/null || { echo "audit-log branch not yet created — nothing to sync"; exit 0; }
          git checkout origin/audit-log -- audit/oversight-log.jsonl 2>/dev/null || true
          git checkout origin/audit-log -- audit/overnight-loop-log.md 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/oversight-log.jsonl audit/overnight-loop-log.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No audit log changes to sync"
            exit 0
          fi
          git commit -m "chore(audit): sync logs from audit-log branch [skip ci]"
          git push origin main
